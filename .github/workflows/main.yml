name: Career Sync - 2026 Final
on:
  schedule:
    - cron: '0 10 * * *' # פעם ביום ב-10 בבוקר
  workflow_dispatch:      # הרצה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # הגרסה היציבה שגוגל דורשת

      - name: Install dependencies
        run: pip install -U google-genai

      - name: Run Job Sync
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          from google import genai
          import os
          import json
          import time

          # שימוש בלקוח החדש של גוגל (SDK 2026)
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          
          # המודל היציב והמהיר ביותר כיום
          model_id = "gemini-1.5-flash"

          prompt = """
          Search for 15 high-level job openings (VP Strategy, VP Operations, VP Partnerships, or Director in Commercial Banking).
          Criteria: US Remote or Hybrid Orlando FL, Salary $150k+ base. Focus on Crypto, VC, and Asset Management.
          Return ONLY a JSON array with these fields: company, role, salary, match_percent (int), analysis (Hebrew), link.
          Do not include any text before or after the JSON array.
          """

          def get_jobs():
              for attempt in range(3):
                  try:
                      # הפקודה המעודכנת
                      response = client.models.generate_content(
                          model=model_id,
                          contents=prompt
                      )
                      if response and response.text:
                          text = response.text.strip()
                          # חילוץ נקי של ה-JSON מהתשובה
                          start = text.find('[')
                          end = text.rfind(']') + 1
                          if start != -1 and end != 0:
                              return json.loads(text[start:end])
                  except Exception as e:
                      print(f"Attempt {attempt+1} failed: {e}")
                      time.sleep(30)
              return None

          new_jobs = get_jobs()
          if new_jobs:
              with open('jobs.json', 'w', encoding='utf-8') as f:
                  json.dump(new_jobs, f, ensure_ascii=False, indent=2)
              print('Jobs updated successfully!')
          else:
              print('Critical Error: Could not fetch jobs from AI.')
              exit(1)
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add jobs.json
          git commit -m 'Automated Career Update' || echo 'No changes to commit'
          git push
