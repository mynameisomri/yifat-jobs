name: Ifat Job Update
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Scanner
        run: python scanner.py
      - name: Commit and Push
        run: |
          git config --global user.name "IfatJobBot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "Automated update with Pretty Print" || echo "No changes"
          git push
