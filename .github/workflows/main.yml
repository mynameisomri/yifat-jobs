name: Career Sync - Daily Final
on:
  schedule:
    - cron: '0 10 * * *'  # ירוץ פעם ביום ב-10 בבוקר
  workflow_dispatch:      # מאפשר לך להריץ ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Job Sync
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import google.generativeai as genai
          import os
          import json
          import time

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash')

          prompt = '''
          Search for 15 high-level job openings (VP Strategy, VP Operations, VP Partnerships, or Director in Commercial Banking).
          Criteria: US Remote or Hybrid Orlando FL, Salary $150k+ base. Focus on Crypto, VC, and Asset Management.
          Return ONLY a JSON array with these fields: company, role, salary, match_percent (int), analysis (Hebrew), link.
          Do not include any text before or after the JSON.
          '''

          def get_jobs():
              for attempt in range(3):
                  try:
                      response = model.generate_content(prompt)
                      if response.text:
                          clean_text = response.text.replace('```json', '').replace('```', '').strip()
                          # וודא שהטקסט מתחיל ב-[ ומסתיים ב-]
                          start = clean_text.find('[')
                          end = clean_text.rfind(']') + 1
                          return json.loads(clean_text[start:end])
                  except Exception as e:
                      print(f'Attempt {attempt+1} failed: {e}')
                      time.sleep(30)
              return None

          new_jobs = get_jobs()
          if new_jobs:
              with open('jobs.json', 'w', encoding='utf-8') as f:
                  json.dump(new_jobs, f, ensure_ascii=False, indent=2)
              print('Successfully updated jobs.json')
          else:
              print('Failed to get jobs after retries')
              exit(1)
          "

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add jobs.json
          git commit -m 'Daily career sync' || echo 'No changes to commit'
          git push
