name: Career Sync - Robust Final
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write      # נוסף כדי לוודא עדכון אתר
      id-token: write   # נוסף כדי לוודא עדכון אתר
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libs
        run: pip install google-generativeai

      - name: Run Robust Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import google.generativeai as genai
          import json, os, re
          genai.configure(api_key=os.environ.get('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')
          try:
              with open('jobs.json', 'r', encoding='utf-8') as f: jobs = json.load(f)
          except: jobs = []
          prompt = 'Find 10 VP/Director jobs in Fintech/Banking Strategy/Ops, Remote US, $150k+. Return ONLY JSON list: [{\"company\":\"\",\"role\":\"\",\"salary\":\"\",\"match_percent\":0,\"analysis\":\"\",\"link\":\"\"}]. Hebrew analysis.'
          try:
              res = model.generate_content(prompt)
              json_match = re.search(r'\[.*\]', res.text, re.DOTALL)
              if json_match:
                  new_data = json.loads(json_match.group(0))
                  existing_ids = {f'{j.get(\"company\")}|{j.get(\"role\")}' for j in jobs}
                  for j in new_data:
                      if f'{j.get(\"company\")}|{j.get(\"role\")}' not in existing_ids:
                          jobs.append(j)
                  with open('jobs.json', 'w', encoding='utf-8') as f:
                      json.dump(jobs[-200:], f, ensure_ascii=False, indent=2)
          except Exception as e: print(f'Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config user.name 'CareerBot'
          git config user.email 'bot@github.com'
          git add jobs.json
          git commit -m "Robust auto-update" || exit 0
          git push
