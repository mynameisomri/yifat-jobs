name: Ifat Job Update

on:
  schedule:
    - cron: '0 12 * * *' # ירוץ כל יום ב-12:00 (צהריים ניו יורק)
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # קריטי ליכולת לעדכן את ה-JSON
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run Update Script
        run: python scanner.py

      - name: Push Changes
        run: |
          git config --global user.name "IfatJobBot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "Automated update: New jobs for Ifat" || echo "No changes to commit"
          git push
