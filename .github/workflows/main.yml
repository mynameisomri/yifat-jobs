name: Career Sync
on:
  schedule:
    - cron: '0 12,17,23 * * *' # רץ ב-8 בבוקר, 1 בצהריים ו-7 בערב (שעון ניו יורק)
  workflow_dispatch: # מאפשר הרצה ידנית
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Libs
        run: pip install google-generativeai
      - name: Run Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import google.generativeai as genai
          import json, os, re

          genai.configure(api_key=os.environ.get('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')
          
          try:
              with open('jobs.json', 'r', encoding='utf-8') as f: 
                  jobs = json.load(f)
          except: 
              jobs = []

          # פרומפט משופר: חיפוש רחב יותר ותובנות בעברית
          prompt = 'Search for 5 current high-level VP or Director jobs in the US (Remote/Hybrid). Focus on Fintech, Banking, or Strategy. For each job, provide: company, role, salary, match_percent (85-98), and a short 2-sentence hiring insight IN HEBREW. Return ONLY a pure JSON list: [{\"company\":\"\",\"role\":\"\",\"salary\":\"\",\"match_percent\":0,\"analysis\":\"\",\"link\":\"\"}]'
          
          try:
              res = model.generate_content(prompt)
              # חילוץ ה-JSON מתוך התשובה של ה-AI
              match = re.search(r'\[.*\]', res.text, re.DOTALL)
              if match:
                  clean_text = match.group(0)
                  new_data = json.loads(clean_text)
                  
                  existing_links = {j.get('link') for j in jobs if j.get('link')}
                  for j in new_data:
                      if j.get('link') not in existing_links:
                          jobs.append(j)
                  
                  with open('jobs.json', 'w', encoding='utf-8') as f:
                      json.dump(jobs[-100:], f, ensure_ascii=False, indent=2)
                  print('Success: Added new jobs.')
              else:
                  print('No JSON found in response.')
          except Exception as e:
              print(f'Error: {e}')
          "
      - name: Commit and Push
        run: |
          git config user.name 'CareerBot'
          git config user.email 'bot@github.com'
          git add jobs.json
          git commit -m "Update jobs with Hebrew insights" || exit 0
          git push
