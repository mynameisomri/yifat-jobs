name: Career Sync
on:
  schedule:
    - cron: '0 12,17,23 * * *' 
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Libs
        run: pip install google-generativeai
      - name: Run Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import google.generativeai as genai
          import json, os, re

          genai.configure(api_key=os.environ.get('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')
          
          try:
              with open('jobs.json', 'r', encoding='utf-8') as f: jobs = json.load(f)
          except: jobs = []

          # פרומפט משופר וגמיש יותר
          prompt = 'Find 5 current high-level VP or Director jobs in US (can be Remote or Hybrid). Focus on Fintech, Banking or Strategy. For each job, provide: company, role, salary estimate, match_percent (80-95), and a short 2-sentence hiring insight. Return ONLY a pure JSON list.'
          
          try:
              res = model.generate_content(prompt)
              # ניקוי אגרסיבי יותר של תגיות Markdown
              clean_text = re.sub(r'```json\s*|```\s*', '', res.text).strip()
              new_data = json.loads(clean_text)
              
              existing_links = {j.get('link', '') for j in jobs}
              for j in new_data:
                  # הוספת לינק גנרי אם ה-AI שכח, כדי שהאתר לא יישבר
                  if 'link' not in j or not j['link']:
                      j['link'] = f'https://www.google.com/search?q={j[\"company\"]}+{j[\"role\"]}+job'.replace(' ', '+')
                  
                  if j.get('link') not in existing_links:
                      jobs.append(j)
              
              with open('jobs.json', 'w', encoding='utf-8') as f:
                  json.dump(jobs[-100:], f, ensure_ascii=False, indent=2)
              print(f'Successfully added {len(new_data)} jobs.')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
      - name: Commit and Push
        run: |
          git config user.name 'CareerBot'
          git config user.email 'bot@github.com'
          git add jobs.json
          git commit -m "Update jobs" || exit 0
          git push
