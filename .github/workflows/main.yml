name: Ifat Job Update

on:
  schedule:
    - cron: '0 12 * * *' # ירוץ כל יום ב-12:00 (צהריים ניו יורק)
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור בגיטהאב

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # חשוב מאוד: מאפשר לבוט לכתוב ל-Repo
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Update Script
        run: python scanner.py
      - name: Push Changes
        run: |
          git config --global user.name "IfatJobBot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "Automated update: New jobs for Ifat" || echo "No changes to commit"
          git push
