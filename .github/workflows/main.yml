name: Career Sync
on:
  schedule:
    - cron: '0 12,17,23 * * *' 
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: # הוספת הרשאות ישירות בקוד ליתר ביטחון
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Libs
        run: pip install google-generativeai
      - name: Run Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import google.generativeai as genai
          import json, os

          genai.configure(api_key=os.environ.get('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')
          
          try:
              with open('jobs.json', 'r', encoding='utf-8') as f: jobs = json.load(f)
          except: jobs = []

          prompt = 'Search for 3-5 VP/Director jobs in Fintech/Banking, US Remote, $150k+. Return ONLY valid JSON: [{\"company\":\"\",\"role\":\"\",\"salary\":\"\",\"match_percent\":0,\"analysis\":\"\",\"link\":\"\"}]'
          
          try:
              res = model.generate_content(prompt)
              text = res.text.strip().replace('```json', '').replace('```', '')
              new_data = json.loads(text)
              
              existing_links = {j.get('link') for j in jobs}
              for j in new_data:
                  if j.get('link') not in existing_links: jobs.append(j)
              
              with open('jobs.json', 'w', encoding='utf-8') as f:
                  json.dump(jobs[-100:], f, ensure_ascii=False, indent=2)
          except Exception as e:
              print(f'Error: {e}')
          "
      - name: Commit and Push
        run: |
          git config user.name 'CareerBot'
          git config user.email 'bot@github.com'
          git add jobs.json
          git commit -m "Update jobs" || exit 0
          git push
