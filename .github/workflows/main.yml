name: Daily Job Scanner

on:
  schedule:
    - cron: '0 17 * * *' # רץ כל יום ב-17:00 UTC (12:00 שעון ניו יורק)
  workflow_dispatch: # מאפשר לך להריץ ידנית מהטאב Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # קריטי: מאפשר לבוט לעדכן את קובץ ה-JSON
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Run Scanner Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scanner.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "JobBot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "Auto-update jobs: $(date)" || echo "No changes to commit"
          git push
