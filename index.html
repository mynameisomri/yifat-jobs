<script>
    async function fetchJobs() {
        try {
            // הוספת ./ לפני שם הקובץ כדי לוודא חיפוש בתיקייה הנוכחית
            const response = await fetch('./jobs.json?t=' + Date.now());
            if (!response.ok) throw new Error('הקובץ לא נמצא בשרת');
            
            const jobs = await response.json();
            const list = document.getElementById('jobs-list');
            list.innerHTML = '';

            if (jobs.length === 0) {
                list.innerHTML = '<p>אין משרות להצגה כרגע.</p>';
                return;
            }

            jobs.forEach(job => {
                list.innerHTML += `
                    <div class="job-card">
                        <div class="company">${job.company}</div>
                        <div>${job.role}</div>
                        <div class="salary">שכר: ${job.salary}</div>
                        <p>${job.analysis}</p>
                        <a href="${job.link}" target="_blank" class="btn">פרטי המשרה</a>
                    </div>`;
            });
        } catch (err) {
            console.error(err);
            document.getElementById('jobs-list').innerHTML = `<p style="color:red;">שגיאה: ${err.message}</p>`;
        }
    }
    fetchJobs();
</script>
