<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משרות חמות עבור יפעת</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .job-card { 
            background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-right: 6px solid #2ecc71;
            transition: transform 0.2s;
        }
        .job-card:hover { transform: scale(1.02); }
        .job-card h3 { margin-top: 0; color: #2c3e50; font-size: 1.4em; }
        .salary { color: #27ae60; font-weight: bold; font-size: 1.1em; }
        .match { background: #e8f8f5; color: #1abc9c; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; display: inline-block; margin-top: 10px; }
        .analysis { line-height: 1.6; margin: 15px 0; color: #555; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .btn:hover { background-color: #2980b9; }
        .loading { text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>הזדמנויות קריירה נבחרות</h1>
        <p>עדכון יומי עבור יפעת - מבוסס ניתוח שוק אישי</p>
    </div>
    <div class="container" id="jobs-container">
        <p class="loading">טוען את המשרות הכי טובות כרגע...</p>
    </div>

    <script>
        async function loadJobs() {
            // כתובת ה-Raw המדויקת והבדוקה של הקובץ שלך
            const url = 'https://raw.githubusercontent.com/mynameisomri/yifat-jobs/main/jobs.json';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('לא הצלחנו למשוך את הקובץ מגיטהאב');
                
                const jobs = await response.json();
                const container = document.getElementById('jobs-container');
                container.innerHTML = '';

                if (!jobs || jobs.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">אין משרות חדשות כרגע.</p>';
                    return;
                }

                jobs.forEach(job => {
                    const card = `
                        <div class="job-card">
                            <h3>${job.company} - ${job.role}</h3>
                            <div class="salary">שכר בסיס: ${job.salary}</div>
                            <div class="match">התאמה של ${job.match_percent}%</div>
                            <p class="analysis"><strong>ניתוח אישי:</strong> ${job.analysis}</p>
                            <a href="${job.link}" target="_blank" class="btn">הגשת מועמדות / פרטים נוספים</a>
                        </div>`;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('jobs-container').innerHTML = 
                    '<p style="text-align:center; color:red;">שגיאה בטעינת הנתונים. וודא שה-Repository מוגדר כ-Public בגיטהאב.</p>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
