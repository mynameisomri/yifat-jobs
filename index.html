<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משרות חמות עבור יפעת</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; text-align: right; }
        .job-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-right: 6px solid #2ecc71; }
        .salary { color: #27ae60; font-weight: bold; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>הזדמנויות קריירה נבחרות עבור יפעת</h1>
    <div class="container" id="jobs-container">טוען משרות...</div>

    <script>
        async function loadJobs() {
            // התיקון: שימוש בנתיב יחסי פשוט בלי תוספות
            const url = 'jobs.json?t=' + Date.now();

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('הקובץ jobs.json לא נמצא');
                
                const jobs = await response.json();
                const container = document.getElementById('jobs-container');
                container.innerHTML = '';

                jobs.forEach(job => {
                    container.innerHTML += `
                        <div class="job-card">
                            <h3>${job.company} - ${job.role}</h3>
                            <p class="salary">שכר: ${job.salary}</p>
                            <p><strong>התאמה:</strong> ${job.match_percent}%</p>
                            <p>${job.analysis}</p>
                            <a href="${job.link}" target="_blank" class="btn">פרטי המשרה</a>
                        </div>`;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('jobs-container').innerHTML = 
                    '<p style="color:red">שגיאה: לא הצלחנו לטעון את המשרות. וודא שקובץ jobs.json קיים ב-Repository.</p>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
